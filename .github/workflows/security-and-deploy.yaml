name: Build and Push Frontend & Backend

on:
    push:
        branches: ["master"]

jobs:
    sast-scan:
        name: Semgrep Security Scan
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Run Semgrep
              run: |
                  docker run --rm -v "${{ github.workspace }}:/src" returntocorp/semgrep:latest semgrep scan --config=auto

    sca-scan:
        name: Trivy Dependency Scan (SCA)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Scan for HIGH vulnerabilities (Log only)
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: "fs"
                  scan-ref: "."
                  vuln-type: "library"
                  severity: "HIGH"
                  exit-code: "0"
                  format: "template"
                  template: "@/contrib/html.tpl"
                  output: "trivy-report.html"

            - name: Scan for CRITICAL vulnerabilities (Break build)
              uses: aquasecurity/trivy-action@master
              with:
                  scan-type: "fs"
                  scan-ref: "."
                  format: "template"
                  template: "@/contrib/html.tpl"
                  output: "trivy-report-critical.html"
                  vuln-type: "library"
                  severity: "CRITICAL"
                  exit-code: "1"

            - name: Upload Trivy Report as Artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: trivy-report
                  path: trivy-report.html
                  if-no-files-found: ignore

            - name: Upload Trivy Report (CRITICAL) as Artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: trivy-report-critical
                  path: trivy-report-critical.html
                  if-no-files-found: ignore

    build-backend:
        name: Build & Push Go Backend
        runs-on: ubuntu-latest
        needs: [sast-scan, sca-scan]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extract Backend Metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ secrets.DOCKERHUB_USERNAME }}/recipe-backend
                  tags: |
                      type=raw,value=latest
                      type=sha,format=short

            - name: Build and push Backend Image
              uses: docker/build-push-action@v5
              with:
                  context: ./app-server
                  file: ./app-server/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}

    build-frontend:
        name: Build & Push Nginx Frontend
        runs-on: ubuntu-latest
        needs: [sast-scan, sca-scan]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extract Frontend Metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ secrets.DOCKERHUB_USERNAME }}/recipe-client
                  tags: |
                      type=raw,value=latest
                      type=sha,format=short

            - name: Build and push Frontend Image
              uses: docker/build-push-action@v5
              with:
                  context: ./app-client
                  file: ./app-client/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}

    dast-scan:
        name: OWASP ZAP DAST Scan
        runs-on: ubuntu-latest
        needs: [build-backend, build-frontend]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Start Application for DAST
              run: |
                  docker compose up -d
                  sleep 15

            - name: ZAP Baseline Scan
              uses: zaproxy/action-baseline@v0.10.0
              with:
                  target: "http://localhost:3000"
              continue-on-error: true

            - name: Upload ZAP Report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: zap-report
                  path: zap_report.html

    deploy:
        name: Deploy to VPS via Ansible
        runs-on: ubuntu-latest
        needs: [build-backend, build-frontend, sast-scan, dast-scan, sca-scan]

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Run Ansible Playbook
              uses: dawidd6/action-ansible-playbook@v2
              with:
                  playbook: ansible/deploy.yaml
                  directory: ./
                  key: ${{ secrets.SSH_PRIVATE_KEY }}
                  inventory: |
                      [vps]
                      ${{ secrets.VPS_HOST }} ansible_user=${{ secrets.VPS_USER }}
