name: Build and Push Frontend & Backend

on:
    push:
        branches: ["master"]

jobs:
    build-backend:
        name: Build & Push Go Backend
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extract Backend Metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ secrets.DOCKERHUB_USERNAME }}/recipe-backend
                  tags: |
                      type=raw,value=latest
                      type=sha,format=short

            - name: Build and push Backend Image
              uses: docker/build-push-action@v5
              with:
                  context: ./app-server
                  file: ./app-server/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}

    build-frontend:
        name: Build & Push Nginx Frontend
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Log in to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Extract Frontend Metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ secrets.DOCKERHUB_USERNAME }}/recipe-client
                  tags: |
                      type=raw,value=latest
                      type=sha,format=short

            - name: Build and push Frontend Image
              uses: docker/build-push-action@v5
              with:
                  context: ./app-client
                  file: ./app-client/Dockerfile
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
